<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DEEP DIVE — the Fathom AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#020817; color:#e8f4f8;
      font-family:'Outfit',sans-serif;
      overflow:hidden; height:100dvh;
    }
    canvas { display:block; touch-action:none; }

    /* HUD */
    #hud {
      position:fixed; top:1rem; left:0; right:0;
      display:flex; justify-content:space-between;
      padding:0 1.2rem; pointer-events:none; z-index:5;
    }
    .hud-panel {
      background:rgba(2,8,23,0.72);
      border:1px solid rgba(0,212,255,0.15);
      border-radius:8px; padding:0.4rem 1rem;
      backdrop-filter:blur(10px);
      min-width:80px; text-align:center;
    }
    .hud-label {
      font-size:0.55rem; letter-spacing:0.22em;
      text-transform:uppercase; color:rgba(0,212,255,0.55);
      margin-bottom:1px;
    }
    .hud-value {
      font-size:1.25rem; font-weight:700; color:#00d4ff;
      text-shadow:0 0 12px rgba(0,212,255,0.5);
    }

    /* Mobile touch zones */
    #touchLeft, #touchRight {
      position:fixed; top:0; bottom:0; width:50%;
      z-index:3; opacity:0;
    }
    #touchLeft  { left:0; }
    #touchRight { right:0; }

    /* Overlay */
    #overlay {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:rgba(2,8,23,0.88);
      backdrop-filter:blur(14px);
      z-index:10; gap:1.4rem;
      text-align:center; padding:2rem;
      transition:opacity 0.4s;
    }
    #overlay.hidden { opacity:0; pointer-events:none; }
    .ov-badge {
      font-size:0.62rem; letter-spacing:0.22em; text-transform:uppercase;
      color:#00d4ff; border:1px solid rgba(0,212,255,0.28);
      padding:0.3rem 1.1rem; border-radius:50px;
      background:rgba(0,212,255,0.07);
    }
    .ov-title {
      font-size:clamp(2.2rem,10vw,4.5rem); font-weight:700;
      color:#fff; line-height:1; letter-spacing:0.02em;
    }
    .ov-title span { color:#00d4ff; text-shadow:0 0 30px rgba(0,212,255,0.5); }
    .ov-catch {
      font-size:0.88rem; color:#8bafc4; line-height:1.9;
      max-width:360px;
    }
    .ov-score { font-size:0.85rem; color:#8bafc4; line-height:2; }
    .ov-score strong {
      font-size:2.4rem; font-weight:700; color:#00d4ff; display:block;
      text-shadow:0 0 20px rgba(0,212,255,0.55);
    }
    .ov-score .ov-best-line { font-size:0.78rem; color:rgba(139,175,196,0.7); }
    #startBtn {
      padding:0.85rem 3rem;
      background:linear-gradient(135deg,#2980b9,#00d4ff);
      color:#020817; border:none; border-radius:6px;
      font-size:1rem; font-weight:700; cursor:pointer;
      font-family:'Outfit',sans-serif; letter-spacing:0.05em;
      transition:transform 0.2s, box-shadow 0.2s;
      box-shadow:0 4px 20px rgba(0,212,255,0.25);
    }
    #startBtn:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,212,255,0.4); }
    .ov-controls { font-size:0.72rem; color:rgba(139,175,196,0.5); }
    .ov-controls span { border:1px solid rgba(0,212,255,0.2); padding:0.1rem 0.5rem; border-radius:4px; margin:0 2px; }

    #backLink {
      position:fixed; bottom:1.2rem; left:50%; transform:translateX(-50%);
      font-size:0.72rem; letter-spacing:0.1em;
      color:rgba(0,212,255,0.4); text-decoration:none;
      transition:color 0.3s; z-index:6; white-space:nowrap;
    }
    #backLink:hover { color:#00d4ff; }

    /* Milestone flash */
    #milestone {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:clamp(1.2rem,5vw,2rem); font-weight:700;
      color:#00d4ff; text-shadow:0 0 30px rgba(0,212,255,0.8);
      pointer-events:none; z-index:8; opacity:0;
      transition:opacity 0.2s;
      white-space:nowrap;
    }
    #milestone.show { opacity:1; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="hud-panel">
      <div class="hud-label">DEPTH</div>
      <div class="hud-value" id="depthVal">0m</div>
    </div>
    <div class="hud-panel">
      <div class="hud-label">BEST</div>
      <div class="hud-value" id="bestVal">0m</div>
    </div>
  </div>

  <div id="touchLeft"></div>
  <div id="touchRight"></div>

  <div id="overlay">
    <div class="ov-badge">the Fathom AI — Mini Game</div>
    <h1 class="ov-title">DEEP<br><span>DIVE</span></h1>
    <p class="ov-catch">深く潜るほど、見えてくる。<br>クラゲと岩を避けながら、深海の底を目指せ。</p>
    <button id="startBtn">潜る →</button>
    <p class="ov-controls">
      <span>←</span><span>→</span>キー　または　画面左右タップ
    </p>
  </div>

  <div id="milestone">DEPTH 100m !</div>
  <a href="../index.html" id="backLink">← ポートフォリオに戻る</a>

  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const depthEl = document.getElementById('depthVal');
    const bestEl  = document.getElementById('bestVal');
    const overlay = document.getElementById('overlay');
    const mileEl  = document.getElementById('milestone');

    // ---- Resize ----
    let W, H;
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ---- State ----
    let state = 'menu';
    let depth, speed, frame, shakeAmt;
    let best = +localStorage.getItem('fathom_deep') || 0;
    bestEl.textContent = best + 'm';

    const diver = { x:0, y:0, vx:0 };
    let obstacles, orbs, bubbles, particles, lastMilestone;

    // ---- Input ----
    const keys = {};
    let tLeft = false, tRight = false;
    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup',   e => keys[e.key] = false);

    document.getElementById('touchLeft').addEventListener('touchstart',  e => { e.preventDefault(); tLeft=true;  }, {passive:false});
    document.getElementById('touchLeft').addEventListener('touchend',    e => { e.preventDefault(); tLeft=false; }, {passive:false});
    document.getElementById('touchRight').addEventListener('touchstart', e => { e.preventDefault(); tRight=true;  }, {passive:false});
    document.getElementById('touchRight').addEventListener('touchend',   e => { e.preventDefault(); tRight=false; }, {passive:false});

    // ---- Game logic ----
    function startGame() {
      state  = 'playing';
      depth  = 0; speed = 2.2; frame = 0; shakeAmt = 0;
      diver.x = W / 2; diver.y = H * 0.28; diver.vx = 0;
      obstacles = []; orbs = []; bubbles = []; particles = [];
      lastMilestone = 0;
      overlay.classList.add('hidden');
    }

    function showMilestone(txt) {
      mileEl.textContent = txt;
      mileEl.classList.add('show');
      setTimeout(() => mileEl.classList.remove('show'), 1200);
    }

    function spawnParticles(x, y, color, n) {
      for (let i = 0; i < n; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd   = 1.5 + Math.random() * 4;
        particles.push({
          x, y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          r:  1.5 + Math.random() * 3,
          life: 1, decay: 0.025 + Math.random() * 0.03,
          color,
        });
      }
    }

    function die() {
      state = 'dead';
      spawnParticles(diver.x, diver.y, 'rgba(0,212,255,', 40);
      shakeAmt = 12;
      const d = Math.floor(depth);
      if (d > best) { best = d; localStorage.setItem('fathom_deep', best); }
      bestEl.textContent = best + 'm';

      setTimeout(() => {
        overlay.classList.remove('hidden');
        overlay.innerHTML = `
          <div class="ov-badge">GAME OVER</div>
          <h1 class="ov-title">深さ<span>${d}m</span></h1>
          <div class="ov-score">
            <span class="ov-best-line">ベスト記録</span>
            <strong>${best}m</strong>
          </div>
          <button id="startBtn">もう一度潜る</button>
          <a href="../index.html" style="font-size:.75rem;color:rgba(0,212,255,.45);text-decoration:none">← ポートフォリオに戻る</a>
        `;
        document.getElementById('startBtn').addEventListener('click', startGame);
      }, 600);
    }

    function update() {
      if (state !== 'playing') return;
      frame++;

      // Speed ramp (caps at 9)
      speed = Math.min(9, 2.2 + depth * 0.005);

      // Depth
      depth += speed * 0.055;
      depthEl.textContent = Math.floor(depth) + 'm';

      // Milestone
      const milestone100 = Math.floor(depth / 100);
      if (milestone100 > lastMilestone) {
        lastMilestone = milestone100;
        showMilestone('DEPTH ' + Math.floor(depth) + 'm !');
      }

      // Shake decay
      if (shakeAmt > 0) shakeAmt *= 0.85;

      // Diver movement
      const accel = 0.014, friction = 0.86;
      if (keys['ArrowLeft']  || keys['a'] || keys['A'] || tLeft)  diver.vx -= accel;
      if (keys['ArrowRight'] || keys['d'] || keys['D'] || tRight) diver.vx += accel;
      diver.vx *= friction;
      diver.x = Math.max(28, Math.min(W - 28, diver.x + diver.vx * W));

      // Move obstacles up
      const dy = speed;
      obstacles.forEach(o => o.y -= dy);
      orbs.forEach(o => o.y -= dy);

      // Bubbles
      bubbles.forEach(b => { b.x += b.vx; b.y += b.vy; });

      // Particles
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.95; p.vy *= 0.95;
        p.life -= p.decay;
      });

      // Prune
      obstacles = obstacles.filter(o => o.y > -80);
      orbs       = orbs.filter(o => o.y > -20);
      bubbles    = bubbles.filter(b => b.y > -20);
      particles  = particles.filter(p => p.life > 0);

      // Spawn obstacles
      const rate = Math.max(42, 110 - depth * 0.28);
      if (frame % Math.round(rate) === 0) spawnObs();

      // Spawn orbs
      if (frame % 180 === 0) spawnOrb();

      // Spawn bubbles
      if (frame % 6 === 0) spawnBubble();

      // Collision — obstacles
      for (const o of obstacles) {
        const dx = o.x - diver.x;
        const dy2 = o.y - diver.y;
        if (Math.hypot(dx, dy2) < o.r + 13) { die(); return; }
      }

      // Collect orbs
      for (let i = orbs.length - 1; i >= 0; i--) {
        const dx = orbs[i].x - diver.x;
        const dy2 = orbs[i].y - diver.y;
        if (Math.hypot(dx, dy2) < orbs[i].r + 18) {
          spawnParticles(orbs[i].x, orbs[i].y, 'rgba(255,200,50,', 12);
          orbs.splice(i, 1);
        }
      }
    }

    function spawnObs() {
      const type = Math.random() < 0.55 ? 'jelly' : 'rock';
      const margin = 60;
      const x = margin + Math.random() * (W - margin * 2);
      const r = type === 'jelly' ? 16 + Math.random() * 18 : 20 + Math.random() * 20;
      obstacles.push({ type, x, y: H + r + 20, r, phase: Math.random() * Math.PI * 2 });
    }

    function spawnOrb() {
      orbs.push({ x: 60 + Math.random() * (W - 120), y: H + 20, r: 9 });
    }

    function spawnBubble() {
      bubbles.push({
        x: Math.random() * W,
        y: H + 8,
        r: 1.2 + Math.random() * 2.8,
        vx: (Math.random() - 0.5) * 0.4,
        vy: -(0.4 + Math.random() * 1.2),
        op: 0.12 + Math.random() * 0.25,
      });
    }

    // ---- Draw helpers ----
    function drawBg() {
      // Dark gradient that gets slightly deeper with depth
      const t = Math.min(1, depth / 600);
      const topC = lerpColor([2,8,23], [1,5,18], t);
      const botC = lerpColor([4,12,30], [2,7,22], t);
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, `rgb(${topC})`);
      grad.addColorStop(1, `rgb(${botC})`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Light rays from surface
      for (let i = 0; i < 6; i++) {
        const rx = (W / 7) * (i + 0.5);
        const alpha = (0.015 - t * 0.01) * (Math.sin(i * 1.4 + frame * 0.002) * 0.4 + 0.7);
        if (alpha <= 0) continue;
        const rayGrad = ctx.createLinearGradient(0, 0, 0, H * 0.55);
        rayGrad.addColorStop(0, `rgba(0,212,255,${alpha})`);
        rayGrad.addColorStop(1, 'rgba(0,212,255,0)');
        ctx.save();
        ctx.translate(rx, 0);
        ctx.rotate(Math.sin(i * 1.2 + frame * 0.003) * 0.08);
        ctx.fillStyle = rayGrad;
        ctx.beginPath();
        ctx.moveTo(-25, 0); ctx.lineTo(25, 0);
        ctx.lineTo(55, H * 0.55); ctx.lineTo(-55, H * 0.55);
        ctx.fill();
        ctx.restore();
      }
    }

    function lerpColor(a, b, t) {
      return a.map((v, i) => Math.round(v + (b[i] - v) * t)).join(',');
    }

    function drawBubbles() {
      bubbles.forEach(b => {
        ctx.save();
        ctx.strokeStyle = `rgba(0,212,255,${b.op})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color + '0.9)';
        ctx.shadowColor = p.color + '0.6)';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    function drawJellyfish(o) {
      const { x, y, r, phase } = o;
      const t = frame * 0.045 + phase;
      const pulse = 0.88 + Math.sin(t) * 0.12;

      ctx.save();
      ctx.translate(x, y);

      // Outer glow
      const gGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 2);
      gGrad.addColorStop(0, 'rgba(200,80,255,0.18)');
      gGrad.addColorStop(1, 'rgba(200,80,255,0)');
      ctx.fillStyle = gGrad;
      ctx.beginPath(); ctx.arc(0, 0, r * 2, 0, Math.PI * 2); ctx.fill();

      // Bell
      ctx.shadowColor = 'rgba(220,90,255,0.65)';
      ctx.shadowBlur = 18;
      ctx.fillStyle   = 'rgba(220,90,255,0.3)';
      ctx.strokeStyle = 'rgba(230,110,255,0.85)';
      ctx.lineWidth   = 1.5;
      ctx.beginPath();
      ctx.ellipse(0, 0, r * pulse, r * 0.65 * pulse, 0, Math.PI, Math.PI * 2);
      ctx.fill(); ctx.stroke();

      // Inner pattern
      ctx.strokeStyle = 'rgba(255,160,255,0.3)';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.ellipse(0, -r*0.2*pulse, r*0.5*pulse, r*0.25*pulse, 0, 0, Math.PI*2);
      ctx.stroke();

      // Tentacles
      ctx.shadowBlur  = 8;
      ctx.strokeStyle = 'rgba(220,90,255,0.45)';
      ctx.lineWidth   = 1;
      const numT = 7;
      for (let i = 0; i < numT; i++) {
        const tx = (i - (numT-1)/2) * (r / 3);
        ctx.beginPath(); ctx.moveTo(tx, 0);
        for (let j = 1; j <= 6; j++) {
          ctx.lineTo(tx + Math.sin(t * 1.2 + i + j * 0.8) * 4, j * 7);
        }
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function drawRock(o) {
      const { x, y, r } = o;
      ctx.save();
      ctx.translate(x, y);
      ctx.shadowColor = 'rgba(0,212,255,0.3)';
      ctx.shadowBlur  = 12;
      ctx.fillStyle   = 'rgba(10,20,40,0.92)';
      ctx.strokeStyle = 'rgba(0,212,255,0.28)';
      ctx.lineWidth   = 1.5;
      ctx.beginPath();
      // Irregular polygon
      const pts = [
        [-r*.55, r*.45], [-r, r*.1], [-r*.85, -r*.45],
        [-r*.3, -r], [r*.35, -r*.85], [r, -r*.25],
        [r*.75, r*.55],
      ];
      ctx.moveTo(pts[0][0], pts[0][1]);
      pts.slice(1).forEach(p => ctx.lineTo(p[0], p[1]));
      ctx.closePath();
      ctx.fill(); ctx.stroke();

      // Highlight edge
      ctx.strokeStyle = 'rgba(0,212,255,0.1)';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function drawOrb(o) {
      const { x, y, r } = o;
      const pulse = 0.75 + Math.sin(frame * 0.07 + x) * 0.25;
      ctx.save();
      const gGrad = ctx.createRadialGradient(x, y, 0, x, y, r * 3);
      gGrad.addColorStop(0,   'rgba(255,210,40,0.55)');
      gGrad.addColorStop(0.5, 'rgba(255,180,20,0.2)');
      gGrad.addColorStop(1,   'rgba(255,160,0,0)');
      ctx.fillStyle = gGrad;
      ctx.beginPath(); ctx.arc(x, y, r * 3 * pulse, 0, Math.PI * 2); ctx.fill();
      ctx.shadowColor = 'rgba(255,210,40,0.95)';
      ctx.shadowBlur  = 14;
      ctx.fillStyle   = '#ffd428';
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function drawDiver() {
      const { x, y, vx } = diver;
      const tilt = vx * 18;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(tilt * Math.PI / 180);

      ctx.shadowColor = 'rgba(0,212,255,0.5)';
      ctx.shadowBlur  = 16;

      // Flippers
      ctx.fillStyle = '#3a8ab0';
      ctx.beginPath(); ctx.ellipse(-9, 18, 5, 11, -0.25, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse( 9, 18, 5, 11,  0.25, 0, Math.PI*2); ctx.fill();

      // Body
      ctx.fillStyle = '#c8dde8';
      ctx.beginPath(); ctx.ellipse(0, 4, 10, 15, 0, 0, Math.PI*2); ctx.fill();

      // Tank
      ctx.fillStyle = '#1a3a5c';
      ctx.beginPath(); ctx.roundRect(-5, -3, 10, 13, 3); ctx.fill();

      // Head
      ctx.fillStyle = 'rgba(40,140,180,0.9)';
      ctx.beginPath(); ctx.ellipse(0, -13, 9, 10, 0, 0, Math.PI*2); ctx.fill();

      // Mask glass
      ctx.fillStyle = 'rgba(0,212,255,0.28)';
      ctx.strokeStyle = 'rgba(0,212,255,0.8)';
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.ellipse(0, -13, 6, 6.5, 0, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();

      // Exhaust bubbles
      if (frame % 12 < 6) {
        ctx.fillStyle = 'rgba(0,212,255,0.4)';
        ctx.beginPath(); ctx.arc(12, -6, 2, 0, Math.PI*2); ctx.fill();
      }

      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function drawDepthMeter() {
      // Subtle depth bar on left edge
      const pct = Math.min(1, depth / 800);
      const barH = H * 0.4;
      const barY = H * 0.3;
      const barX = 12;

      ctx.save();
      ctx.strokeStyle = 'rgba(0,212,255,0.1)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(barX, barY); ctx.lineTo(barX, barY + barH);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(0,212,255,0.55)';
      ctx.shadowColor = 'rgba(0,212,255,0.4)'; ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(barX, barY); ctx.lineTo(barX, barY + barH * pct);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // ---- Main loop ----
    function loop() {
      update();

      // Screen shake
      ctx.save();
      if (shakeAmt > 0.5) {
        ctx.translate(
          (Math.random() - 0.5) * shakeAmt,
          (Math.random() - 0.5) * shakeAmt
        );
      }

      drawBg();
      drawBubbles();
      orbs.forEach(drawOrb);
      obstacles.forEach(o => o.type === 'jelly' ? drawJellyfish(o) : drawRock(o));
      drawParticles();
      if (state === 'playing') drawDiver();
      drawDepthMeter();

      ctx.restore();
      requestAnimationFrame(loop);
    }

    // ---- Init ----
    document.getElementById('startBtn').addEventListener('click', startGame);
    loop();
  })();
  </script>
</body>
</html>
